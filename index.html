<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Battle</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#startScreen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

#startBtn{
padding:20px 50px;
font-size:26px;
border:none;
border-radius:15px;
background:#00c853;
color:white;
font-weight:bold;
}

#game{
display:none;
height:100%;
}

#timer{
font-size:28px;
font-weight:bold;
color:red;
margin:5px;
}

#score{
font-size:22px;
margin:5px;
}

.player{
height:40vh;
display:flex;
justify-content:center;
align-items:center;
}

#p1{background:#0072ff;}
#p2{background:#ff4b2b;}

.tapBtn{
width:90%;
height:120px;
font-size:28px;
font-weight:bold;
border:none;
border-radius:20px;
color:white;
background:rgba(0,0,0,0.4);
}

.tapBtn:active{
transform:scale(0.95);
}

.tapBtn:disabled{
opacity:0.5;
}

#countdown{
position:fixed;
top:40%;
width:100%;
font-size:90px;
font-weight:bold;
display:none;
}

#winScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:32px;
}
</style>
</head>

<body>

<div id="startScreen">
<button id="startBtn" onclick="startGame()">START</button>
</div>

<div id="game">

<div id="timer">30</div>
<div id="score">0 - 0</div>

<div class="player" id="p1">
<button class="tapBtn" onclick="tap(1)" disabled>TAP</button>
</div>

<div class="player" id="p2">
<button class="tapBtn" onclick="tap(2)" disabled>TAP</button>
</div>

</div>

<div id="countdown"></div>
<div id="winScreen"></div>

<script>

let time=30;
let p1=0,p2=0;
let timer;
let gameRunning=false;

function startGame(){

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

/* Countdown */
let count=3;
let cd=document.getElementById("countdown");
cd.style.display="block";
cd.innerText=count;

let interval=setInterval(()=>{

count--;

if(count>0){
cd.innerText=count;
}else{
clearInterval(interval);
cd.style.display="none";
beginBattle();
}

},1000);

}

function beginBattle(){

time=30;
p1=0;
p2=0;
gameRunning=true;

document.querySelectorAll(".tapBtn").forEach(btn=>{
btn.disabled=false;
});

timer=setInterval(()=>{

time--;
document.getElementById("timer").innerText=time;

if(time<=0) endGame();

},1000);

}

function tap(player){

if(!gameRunning) return;

if(player==1) p1++;
if(player==2) p2++;

document.getElementById("score").innerText=
p1+" - "+p2;

}

function endGame(){

clearInterval(timer);
gameRunning=false;

document.querySelectorAll(".tapBtn").forEach(btn=>{
btn.disabled=true;
});

let win=document.getElementById("winScreen");
win.style.display="flex";

if(p1>p2){
win.innerHTML="🏆 PLAYER 1 WINS!";
}
else if(p2>p1){
win.innerHTML="🏆 PLAYER 2 WINS!";
}
else{
win.innerHTML="🤝 DRAW!";
}

}

</script>

</body>
</html>
