<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Tap Battle</title>

<style>

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:#111;
color:white;
text-align:center;
touch-action:manipulation;
}

#startScreen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

#startBtn{
padding:20px 50px;
font-size:28px;
border:none;
border-radius:15px;
background:#00c853;
color:white;
font-weight:bold;
}

#game{
display:none;
height:100%;
}

#timer{
font-size:28px;
font-weight:bold;
color:red;
margin:5px;
}

#score{
font-size:22px;
margin:5px;
}

.player{
height:40vh;
display:flex;
justify-content:center;
align-items:center;
}

#p1{
background:#0072ff;
}

#p2{
background:#ff4b2b;
}

.tapBtn{
width:90%;
height:120px;
font-size:28px;
font-weight:bold;
border:none;
border-radius:20px;
color:white;
background:rgba(0,0,0,0.4);
}

.tapBtn:active{
transform:scale(0.95);
}

.tapBtn:disabled{
opacity:0.5;
}

#countdown{
position:fixed;
top:40%;
width:100%;
font-size:90px;
font-weight:bold;
display:none;
}

#winScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:32px;
}

/* SHOP */
#shop{
position:fixed;
right:10px;
top:10px;
background:#222;
padding:15px;
border-radius:15px;
width:200px;
font-size:14px;
}

#shop button{
padding:10px;
width:100%;
border:none;
background:#ffd600;
border-radius:10px;
font-weight:bold;
}

#shop input{
width:100%;
padding:8px;
border-radius:8px;
border:none;
text-align:center;
}

/* leaderboard */
#leaderboard{
position:fixed;
left:10px;
top:10px;
background:#222;
padding:10px;
border-radius:10px;
font-size:12px;
max-width:150px;
}

</style>
</head>

<body>

<div id="startScreen">
<button id="startBtn">START</button>
</div>

<div id="game">

<div id="timer">30</div>
<div id="score">0 - 0</div>

<div class="player" id="p1">
<button class="tapBtn" id="btn1" disabled>TAP</button>
</div>

<div class="player" id="p2">
<button class="tapBtn" id="btn2" disabled>TAP</button>
</div>

</div>

<!-- SHOP -->
<div id="shop">
<h3>💎 PRO</h3>
<p>2X Tap (3 days)</p>
<p>₱20 GCash</p>

<input type="text" id="codeInput" placeholder="Enter Code">
<br><br>
<button onclick="unlockPro()">UNLOCK</button>

<p id="proStatus">Status: FREE</p>
<p id="proTimer"></p>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard"></div>

<div id="countdown"></div>
<div id="winScreen"></div>

<script>

let time=30;
let p1=0;
let p2=0;
let timer;
let gameRunning=false;

let isPro=false;
let multiplier=1;

const btn1=document.getElementById("btn1");
const btn2=document.getElementById("btn2");

document.getElementById("startBtn").addEventListener("click",startGame);

/* MULTI TOUCH FIX */
btn1.addEventListener("touchstart",(e)=>{
e.preventDefault();
tap(1,e.touches.length);
});

btn2.addEventListener("touchstart",(e)=>{
e.preventDefault();
tap(2,e.touches.length);
});

function startGame(){

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

let count=3;
let cd=document.getElementById("countdown");

cd.style.display="block";
cd.innerText=count;

let interval=setInterval(()=>{

count--;

if(count>0){
cd.innerText=count;
}
else{
clearInterval(interval);
cd.style.display="none";
beginBattle();
}

},1000);

}

function beginBattle(){

time=30;
p1=0;
p2=0;

gameRunning=true;

btn1.disabled=false;
btn2.disabled=false;

timer=setInterval(()=>{

time--;
document.getElementById("timer").innerText=time;

if(time<=0){
endGame();
}

},1000);

}

function tap(player,touches=1){

if(!gameRunning) return;

let add = touches * multiplier;

if(player===1){
p1 += add;
}else{
p2 += add;
}

document.getElementById("score").innerText=p1+" - "+p2;

}

function endGame(){

clearInterval(timer);
gameRunning=false;

btn1.disabled=true;
btn2.disabled=true;

/* SAVE SCORE */
saveScore();

let win=document.getElementById("winScreen");
win.style.display="flex";

if(p1>p2){
win.innerHTML="🏆 PLAYER 1 WINS!";
}
else if(p2>p1){
win.innerHTML="🏆 PLAYER 2 WINS!";
}
else{
win.innerHTML="🤝 DRAW!";
}

/* LOAD LEADERBOARD */
loadScores();

}

/* ================= PRO SYSTEM ================= */

function unlockPro(){

let code=document.getElementById("codeInput").value;

let validCodes=["VIP123","PRO456","GCASH20"];

if(validCodes.includes(code)){
activatePro(3);
}else{
alert("Invalid Code");
}

}

function activatePro(days){

let expiry = new Date().getTime() + (days*24*60*60*1000);

localStorage.setItem("proExpiry",expiry);

checkPro();

alert("PRO Activated!");

}

function checkPro(){

let expiry=localStorage.getItem("proExpiry");

if(expiry && new Date().getTime()<expiry){
isPro=true;
multiplier=2;
document.getElementById("proStatus").innerText="Status: PRO ✅";
}else{
isPro=false;
multiplier=1;
document.getElementById("proStatus").innerText="Status: FREE ❌";
}

}

/* TIMER DISPLAY */
setInterval(()=>{

let expiry=localStorage.getItem("proExpiry");

if(expiry){

let remaining=expiry-new Date().getTime();

if(remaining>0){

let h=Math.floor(remaining/(1000*60*60));
let m=Math.floor((remaining%(1000*60*60))/(1000*60));

document.getElementById("proTimer").innerText="Expires: "+h+"h "+m+"m";

}else{
document.getElementById("proTimer").innerText="Expired";
}

}

},1000);

/* ================= SCOREBOARD ================= */

function saveScore(){

let history=JSON.parse(localStorage.getItem("scores"))||[];

history.push({
p1:p1,
p2:p2,
date:new Date().toLocaleString()
});

localStorage.setItem("scores",JSON.stringify(history));

}

function loadScores(){

let history=JSON.parse(localStorage.getItem("scores"))||[];

let html="<b>Top Matches</b><br>";

history.slice(-5).reverse().forEach(s=>{
html+=`${s.p1}-${s.p2}<br>`;
});

document.getElementById("leaderboard").innerHTML=html;

}

/* INIT */
checkPro();
loadScores();

</script>

</body>
</html>
