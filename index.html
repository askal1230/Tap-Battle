<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Battle Ultimate</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
overflow:hidden;
}

h1{
font-size:20px;
margin:10px;
}

#timer{
font-size:26px;
color:#ff4757;
font-weight:bold;
}

#score{
font-size:20px;
margin:5px;
}

#result{
font-size:22px;
font-weight:bold;
margin:5px;
}

.container{
display:flex;
height:42vh;
}

.player{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.tapBtn{
width:85%;
height:120px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:20px;
color:white;
margin-top:10px;
}

#p1{
background:linear-gradient(45deg,#00ff88,#00c853);
}

#p2{
background:linear-gradient(45deg,#2196F3,#0d47a1);
}

.tapBtn:active{
transform:scale(0.95);
}

.hp{
width:80%;
height:18px;
background:#444;
border-radius:10px;
margin-top:8px;
overflow:hidden;
}

.hp-bar{
height:100%;
width:100%;
background:limegreen;
transition:0.2s;
}

#boost{
margin:8px;
padding:10px 18px;
font-size:16px;
border:none;
border-radius:8px;
background:#ff9800;
color:white;
font-weight:bold;
}

#start{
padding:10px 20px;
border:none;
border-radius:8px;
background:black;
color:white;
font-weight:bold;
margin:5px;
}

.shake{
animation:shake 0.2s;
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(-5px,5px);}
50%{transform:translate(5px,-5px);}
75%{transform:translate(-5px,5px);}
100%{transform:translate(0,0);}
}

/* 🔨 HAMMER EFFECT */
.hammer{
position:fixed;
font-size:40px;
pointer-events:none;
animation:hammerHit 0.3s ease-out;
}

@keyframes hammerHit{
0%{transform:scale(1) rotate(0deg);opacity:1;}
50%{transform:scale(1.5) rotate(-20deg);}
100%{transform:scale(0.5) rotate(20deg);opacity:0;}
}

</style>
</head>

<body>

<h1>🔥 TAP BATTLE 🔥</h1>

<div id="timer">30</div>
<div id="score">0 - 0</div>
<div id="result"></div>

<div class="container">

<div class="player">
<div>Player 1</div>
<div class="hp"><div id="hp1" class="hp-bar"></div></div>
<button id="p1" class="tapBtn" onclick="tap(1)" disabled>TAP</button>
</div>

<div class="player">
<div>Player 2</div>
<div class="hp"><div id="hp2" class="hp-bar"></div></div>
<button id="p2" class="tapBtn" onclick="tap(2)" disabled>TAP</button>
</div>

</div>

<button id="start" onclick="startGame()">START</button>
<button id="boost" onclick="boost()">⚡ BOOST</button>

<script>

let time=30;
let p1=0,p2=0;
let hp1=100,hp2=100;
let boost1=false,boost2=false;
let gameRunning=false;
let timer;

function startGame(){

clearInterval(timer);

time=30;
p1=0;p2=0;
hp1=100;hp2=100;
gameRunning=true;

document.getElementById("p1").disabled=false;
document.getElementById("p2").disabled=false;

updateHP();
document.getElementById("result").innerText="";
document.getElementById("score").innerText="0 - 0";

timer=setInterval(()=>{

time--;
document.getElementById("timer").innerText=time;

if(time<=0) endGame();

},1000);

}

function tap(player){

if(!gameRunning) return;

if(player==1){
p1++;
damage(2);
}
else{
p2++;
damage(1);
}

document.getElementById("score").innerText=
p1+" - "+p2;

screenShake();

/* 🔨 Hammer Effect */
let hammer=document.createElement("div");
hammer.className="hammer";
hammer.innerText="🔨";
hammer.style.left=event.clientX+"px";
hammer.style.top=event.clientY+"px";
document.body.appendChild(hammer);

setTimeout(()=>{hammer.remove();},300);

}

function damage(target){

let dmg=5;

if(target==1 && boost1) dmg=10;
if(target==2 && boost2) dmg=10;

if(target==1) hp1-=dmg;
if(target==2) hp2-=dmg;

if(hp1<0) hp1=0;
if(hp2<0) hp2=0;

updateHP();

}

function updateHP(){

document.getElementById("hp1").style.width=hp1+"%";
document.getElementById("hp2").style.width=hp2+"%";

}

function boost(){

if(!gameRunning) return;

if(p1>p2) boost1=true;
else boost2=true;

setTimeout(()=>{
boost1=false;
boost2=false;
},5000);

}

function endGame(){

clearInterval(timer);
gameRunning=false;

document.getElementById("p1").disabled=true;
document.getElementById("p2").disabled=true;

let result="";

if(hp1>hp2) result="🏆 Player 1 Wins!";
else if(hp2>hp1) result="🏆 Player 2 Wins!";
else result="🤝 Draw!";

document.getElementById("result").innerText=result;

}

function screenShake(){

document.body.classList.add("shake");
setTimeout(()=>{
document.body.classList.remove("shake");
},200);

}

</script>

</body>
</html>
