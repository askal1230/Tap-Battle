<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Battle Ultimate</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
overflow:hidden;
}

h1{font-size:20px;margin:6px;}

input,select{
padding:6px;
margin:4px;
border-radius:6px;
border:none;
text-align:center;
}

#timer{
font-size:26px;
color:#ff4757;
font-weight:bold;
margin:5px;
}

#score{
font-size:22px;
margin:5px;
}

#result{
font-size:26px;
font-weight:bold;
margin:8px;
}

.player{
height:35vh;
display:flex;
justify-content:center;
align-items:center;
}

#p1{background:#1e90ff;}
#p2{background:#ff69b4;}

.tapBtn{
width:85%;
height:100px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:20px;
color:white;
background:rgba(0,0,0,0.4);
}

.tapBtn:active{
transform:scale(0.95);
}

#start{
padding:10px 20px;
border:none;
border-radius:8px;
background:black;
color:white;
font-weight:bold;
margin:5px;
}

/* Countdown */
#countdown{
font-size:60px;
font-weight:bold;
position:fixed;
top:40%;
width:100%;
display:none;
}

/* Win Screen */
#winScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:32px;
animation:pop 0.5s ease;
}

@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

.moto{
font-size:14px;
margin:5px;
color:#ffd700;
}

</style>
</head>

<body>

<h1>🔥 TAP BATTLE 🔥</h1>
<div class="moto">"Fight Fast. Tap Hard. Win Big!"</div>

<input id="player1" placeholder="Player 1 Name">
<select id="char1">
<option value="👦">Boy</option>
<option value="👧">Girl</option>
</select>

<br>

<input id="player2" placeholder="Player 2 Name">
<select id="char2">
<option value="👦">Boy</option>
<option value="👧">Girl</option>
</select>

<br>

<div id="timer">30</div>
<div id="score">0 - 0</div>
<div id="result"></div>

<div class="player" id="p1">
<button class="tapBtn" onclick="tap(1)" disabled>TAP</button>
</div>

<div class="player" id="p2">
<button class="tapBtn" onclick="tap(2)" disabled>TAP</button>
</div>

<button id="start" onclick="startGame()">START</button>

<div id="countdown"></div>

<div id="winScreen"></div>

<script>

let time=30;
let p1=0,p2=0;
let timer;
let gameRunning=false;

function startGame(){

let name1=document.getElementById("player1").value.trim();
let name2=document.getElementById("player2").value.trim();

if(name1=="" || name2==""){
alert("Enter both player names!");
return;
}

countDownStart();

}

function countDownStart(){

let count=3;
let cd=document.getElementById("countdown");
cd.style.display="block";
cd.innerText=count;

let interval=setInterval(()=>{

count--;
if(count>0){
cd.innerText=count;
}
else{
clearInterval(interval);
cd.style.display="none";
beginGame();
}

},1000);

}

function beginGame(){

time=30;
p1=0;
p2=0;
gameRunning=true;

document.querySelectorAll(".tapBtn").forEach(btn=>{
btn.disabled=false;
});

document.getElementById("score").innerText="0 - 0";
document.getElementById("result").innerText="";

timer=setInterval(()=>{

time--;
document.getElementById("timer").innerText=time;

if(time<=0) endGame();

},1000);

}

function tap(player){

if(!gameRunning) return;

if(player==1) p1++;
if(player==2) p2++;

document.getElementById("score").innerText=
p1+" - "+p2;

}

function endGame(){

clearInterval(timer);
gameRunning=false;

document.querySelectorAll(".tapBtn").forEach(btn=>{
btn.disabled=true;
});

let name1=document.getElementById("player1").value;
let name2=document.getElementById("player2").value;
let char1=document.getElementById("char1").value;
let char2=document.getElementById("char2").value;

let winScreen=document.getElementById("winScreen");
winScreen.style.display="flex";

if(p1>p2){
winScreen.innerHTML=
char1+" "+name1+" WINS! 🏆<br><br>🔥 BIG WIN!";
}
else if(p2>p1){
winScreen.innerHTML=
char2+" "+name2+" WINS! 🏆<br><br>🔥 BIG WIN!";
}
else{
winScreen.innerHTML="🤝 DRAW!";
}

}

</script>

</body>
</html>
