<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bomb Pass PRO</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
background:linear-gradient(-45deg,#111,#1a1a2e,#16213e,#0f3460);
background-size:400% 400%;
animation:gradient 10s ease infinite;
touch-action:manipulation;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

button{
padding:12px 18px;
margin:6px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

input, select{
padding:10px;
border-radius:8px;
border:none;
width:220px;
text-align:center;
}

.menu{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
gap:8px;
}

#game{display:none;}

#gameHeader{
padding:10px;
background:rgba(0,0,0,0.4);
}

.player{
height:38vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:26px;
font-weight:bold;
}

#p1{background:#1976d2;}
#p2{background:#e53935;}

.disabled{
pointer-events:none;
opacity:0.6;
}

#countdown{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
display:none;
}

#result{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:22px;
}

footer{
position:fixed;
bottom:0;
width:100%;
padding:6px;
font-size:12px;
background:rgba(0,0,0,0.6);
text-align:center;
}
</style>
</head>

<body>

<div id="menu" class="menu">
<h1>💣 Bomb Pass PRO</h1>

<input type="text" id="name1" placeholder="Player 1 Name">
<input type="text" id="name2" placeholder="Player 2 Name">

<select id="difficulty">
<option value="easy">🟢 Easy</option>
<option value="normal" selected>🟡 Normal</option>
<option value="hard">🔴 Hard</option>
</select>

<button onclick="startGame()">▶ START</button>
</div>

<div id="game">

<div id="gameHeader">
Level: <span id="level">1</span> |
Time: <span id="timer">0</span> |
Lives: <span id="lives"></span>
</div>

<div class="player disabled" id="p1" onclick="passBomb(1)"></div>
<div class="player disabled" id="p2" onclick="passBomb(2)"></div>

</div>

<div id="countdown"></div>
<div id="result"></div>

<footer>
© 2026 — Developed By Cha
</footer>

<script>

let p1Lives=3,p2Lives=3;
let bombHolder=1;
let time,interval;
let level=1;
let gameActive=false;

let player1Name="Player 1";
let player2Name="Player 2";

function startGame(){

player1Name=document.getElementById("name1").value||"Player 1";
player2Name=document.getElementById("name2").value||"Player 2";

document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";

startCountdown();
}

function startCountdown(){

let count=3;
let cd=document.getElementById("countdown");
cd.style.display="block";

let c=setInterval(()=>{

cd.innerText=count;
count--;

if(count<0){
clearInterval(c);
cd.style.display="none";
enableGame();
startRound();
}

},1000);
}

function enableGame(){
gameActive=true;
document.getElementById("p1").classList.remove("disabled");
document.getElementById("p2").classList.remove("disabled");
}

function startRound(){

bombHolder=1;

let diff=document.getElementById("difficulty").value;

if(diff==="easy") time=10;
if(diff==="normal") time=7;
if(diff==="hard") time=4;

interval=setInterval(()=>{

time--;
document.getElementById("timer").innerText=time;

if(time<=0) endRound();

},1000);

updateUI();
}

function passBomb(player){
if(!gameActive) return;
if(player!==bombHolder) return;

bombHolder=bombHolder===1?2:1;
updateUI();
}

function endRound(){

clearInterval(interval);

if(bombHolder===1)p1Lives--;
else p2Lives--;

level++;

if(p1Lives<=0||p2Lives<=0){
showWinner();
}else{
startRound();
}
}

function updateUI(){

document.getElementById("level").innerText=level;

document.getElementById("p1").innerHTML=
"<div>"+player1Name+"</div>"+
"<div>"+(bombHolder===1?"🔥 HOLDING":"")+"</div>";

document.getElementById("p2").innerHTML=
"<div>"+player2Name+"</div>"+
"<div>"+(bombHolder===2?"🔥 HOLDING":"")+"</div>";

let status="";
if(p1Lives>p2Lives) status="🏆 "+player1Name+" LEADING";
else if(p2Lives>p1Lives) status="🏆 "+player2Name+" LEADING";
else status="⚖️ TIED";

document.getElementById("lives").innerHTML=
player1Name+": ❤️".repeat(p1Lives)+" | "+
player2Name+": ❤️".repeat(p2Lives)+"<br>"+status;
}

function showWinner(){

document.getElementById("game").style.display="none";

let result=document.getElementById("result");
result.style.display="flex";

let winner=p1Lives<=0?player2Name:player1Name;

result.innerHTML=
"🏆 "+winner+" WINS!<br><br>"+
"<button onclick='location.reload()'>PLAY AGAIN</button>";
}

</script>

</body>
</html>
