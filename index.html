<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Battle</title>

<style>

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

h1{font-size:18px;margin:6px;}

input,select{
padding:6px;
margin:4px;
border-radius:6px;
border:none;
text-align:center;
}

#setup{
padding:10px;
}

#game{
display:none;
height:100%;
}

#timer{
font-size:24px;
color:red;
font-weight:bold;
}

#score{
font-size:22px;
margin:4px;
}

.player{
height:40vh;
display:flex;
justify-content:center;
align-items:center;
}

#p1{background:#0072ff;}
#p2{background:#ff4b2b;}

.tapBtn{
width:90%;
height:120px;
font-size:26px;
font-weight:bold;
border:none;
border-radius:20px;
color:white;
background:rgba(0,0,0,0.4);
}

.tapBtn:active{
transform:scale(0.95);
}

#startBtn{
padding:10px 20px;
border:none;
border-radius:8px;
background:black;
color:white;
font-weight:bold;
margin:6px;
}

#countdown{
position:fixed;
top:40%;
width:100%;
font-size:70px;
font-weight:bold;
display:none;
}

#winScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:30px;
}

</style>
</head>

<body>

<h1>🔥 TAP BATTLE 🔥</h1>

<!-- SETUP SCREEN -->
<div id="setup">

<input id="player1" placeholder="Player 1 Name">
<select id="char1">
<option value="👦">Boy</option>
<option value="👧">Girl</option>
</select>

<br>

<input id="player2" placeholder="Player 2 Name">
<select id="char2">
<option value="👦">Boy</option>
<option value="👧">Girl</option>
</select>

<br>

<button id="startBtn" onclick="startGame()">START GAME</button>

</div>

<!-- GAME SCREEN -->
<div id="game">

<div id="timer">30</div>
<div id="score">0 - 0</div>

<div class="player" id="p1">
<button class="tapBtn" onclick="tap(1)" disabled>TAP</button>
</div>

<div class="player" id="p2">
<button class="tapBtn" onclick="tap(2)" disabled>TAP</button>
</div>

</div>

<div id="countdown"></div>
<div id="winScreen"></div>

<script>

let time=30;
let p1=0,p2=0;
let timer;
let gameRunning=false;

function startGame(){

let name1=document.getElementById("player1").value.trim();
let name2=document.getElementById("player2").value.trim();

if(name1=="" || name2==""){
alert("Enter both names!");
return;
}

/* Hide setup, show game */
document.getElementById("setup").style.display="none";
document.getElementById("game").style.display="block";

/* Countdown */
let count=3;
let cd=document.getElementById("countdown");
cd.style.display="block";
cd.innerText=count;

let interval=setInterval(()=>{

count--;
if(count>0){
cd.innerText=count;
}else{
clearInterval(interval);
cd.style.display="none";
beginGame();
}

},1000);

}

function beginGame(){

time=30;
p1=0;
p2=0;
gameRunning=true;

document.querySelectorAll(".tapBtn").forEach(btn=>{
btn.disabled=false;
});

document.getElementById("score").innerText="0 - 0";

timer=setInterval(()=>{

time--;
document.getElementById("timer").innerText=time;

if(time<=0) endGame();

},1000);

}

function tap(player){

if(!gameRunning) return;

if(player==1) p1++;
if(player==2) p2++;

document.getElementById("score").innerText=
p1+" - "+p2;

}

function endGame(){

clearInterval(timer);
gameRunning=false;

document.querySelectorAll(".tapBtn").forEach(btn=>{
btn.disabled=true;
});

let name1=document.getElementById("player1").value;
let name2=document.getElementById("player2").value;
let char1=document.getElementById("char1").value;
let char2=document.getElementById("char2").value;

let win=document.getElementById("winScreen");
win.style.display="flex";

if(p1>p2){
win.innerHTML=char1+" "+name1+" WINS! 🏆";
}
else if(p2>p1){
win.innerHTML=char2+" "+name2+" WINS! 🏆";
}
else{
win.innerHTML="🤝 DRAW!";
}

}

</script>

</body>
</html>
